
<!DOCTYPE html>
<html>
<head>
  <title>Employee Form</title>
</head>
<body>
  <h2>Employee Registration Form</h2>
  <form action="#" method="post">
    <label for="empId">Employee ID:</label><br>
    <input type="text" id="empId" name="empId" required><br><br>

    <label for="empName">Full Name:</label><br>
    <input type="text" id="empName" name="empName" required><br><br>

    <label for="empEmail">Email:</label><br>
    <input type="email" id="empEmail" name="empEmail" required><br><br>

    <label for="empDept">Department:</label><br>
    <input type="text" id="empDept" name="empDept"><br><br>

    <label for="joinDate">Joining Date:</label><br>
    <input type="date" id="joinDate" name="joinDate"><br><br>

    <input type="submit" value="Submit">
  </form>
</body>
</html>
